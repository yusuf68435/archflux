events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name archflux-yusuf435.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 200 "ArchFlux - initializing SSL...";
            add_header Content-Type text/plain;
        }
    }
}
