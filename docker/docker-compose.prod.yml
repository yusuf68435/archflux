# Production overrides - run with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: always

  redis:
    restart: always
    command: redis-server

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    restart: always

  frontend:
    ports:
      - "4000:3000"
    environment:
      DATABASE_URL: postgresql://rolix:${POSTGRES_PASSWORD}@postgres:5432/rolix
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      AI_SERVICE_URL: http://backend:8000
      AI_SERVICE_API_KEY: ${API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN:-}
    restart: always

  backend:
    ports:
      - "8010:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://rolix:${POSTGRES_PASSWORD}@postgres:5432/rolix
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      API_KEY: ${API_KEY}
      ALLOWED_ORIGINS: ${NEXTAUTH_URL}
      SENTRY_DSN: ${SENTRY_DSN:-}
      DEVICE: ${DEVICE:-cuda}
    restart: always

  celery-worker:
    environment:
      DATABASE_URL: postgresql+asyncpg://rolix:${POSTGRES_PASSWORD}@postgres:5432/rolix
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      API_KEY: ${API_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
      DEVICE: ${DEVICE:-cuda}
    restart: always

  nginx:
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/nginx/ssl:ro
      - /var/www/certbot:/var/www/certbot:ro

  # Prisma migration runner (runs once then exits)
  migrate:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: builder
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://rolix:${POSTGRES_PASSWORD}@postgres:5432/rolix
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
